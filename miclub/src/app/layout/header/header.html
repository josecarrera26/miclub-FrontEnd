<header class="w-full bg-white shadow-md border-b-4 border-club-green">

    <div class="bg-club-blue text-white text-xs py-2 text-center font-medium w-full">
        Beneficios exclusivos para ti | Envío gratis en compras mayores a $50
    </div>

    <div class="w-full px-8">
        <div class="flex justify-between items-center h-20 gap-8">

            <div class="flex-shrink-0 cursor-pointer h-full py-2 flex items-center" routerLink="/">
                <img src="assets/images/logo/MiClubLogo.png" alt="Mi Club"
                    class="h-full w-auto object-contain max-w-full block">
            </div>

            <div class="hidden md:flex flex-1 max-w-2xl relative">
                <input (input)="onSearch($event)" type="text" placeholder="¿Qué estás buscando hoy?"
                    class="w-full border-2 border-gray-100 bg-gray-50 h-11 px-6 rounded-full text-sm focus:outline-none focus:border-club-green transition-all">
                <button class="absolute right-5 top-3 text-gray-400">🔍</button>
            </div>

            <div class="flex items-center gap-6 flex-shrink-0">

                <div class="flex items-center gap-6">
                    <button routerLink="/login" class="text-club-blue font-black hover:text-club-purple transition">
                        INICIAR SESIÓN
                    </button>

                    <button routerLink="/register"
                        class="bg-club-green text-club-blue px-8 py-2.5 rounded-full font-black text-sm shadow-md hover:scale-105 transition active:scale-95">
                        REGÍSTRATE
                    </button>
                </div>

                @if (auth.isLoggedIn$ | async) {
                <button routerLink="/carrito"
                    class="relative p-3 flex items-center justify-center bg-gray-100 rounded-full hover:bg-gray-200 transition">
                    <span class="text-3xl">🛒</span>

                    <span *ngIf="cartCount > 0" class="absolute -top-1 -right-1 flex items-center justify-center 
               bg-[#E61D6E] text-white text-[12px] font-extrabold
               h-6 w-6 rounded-full border-2 border-white shadow-md z-10">
                        {{ cartCount }}
                    </span>
                </button>
                }

            </div>
        </div>
    </div>
</header>
