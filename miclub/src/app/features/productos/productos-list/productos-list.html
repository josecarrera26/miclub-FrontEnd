<div class="mb-10">
    <app-carousel></app-carousel>
</div>

<div class="px-6">
    <h2 class="text-2xl font-black text-club-blue mb-6 uppercase tracking-tight">Catálogo de Productos</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        @for (item of productosFiltrados; track item.id) {
        <app-producto-card [producto]="item"></app-producto-card>
        } @empty {
        <div class="col-span-full text-center py-20">
            <span class="text-6xl mb-4 block">🔎</span>
            <h3 class="text-xl font-bold text-gray-400">No hay productos que coincidan con tu búsqueda</h3>
            <p class="text-gray-400">Intenta con otro nombre o categoría</p>
        </div>
        }
    </div>
</div>
